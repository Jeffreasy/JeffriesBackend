name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache: false
      - name: Install pinned Gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.28.0
      # Scan only the clean current checkout. Historical credentials are handled
      # by rotation; scanning git history would permanently block CI without a
      # coordinated history rewrite.
      - name: Scan current tracked checkout for secrets
        run: gitleaks dir . --redact --no-banner --verbose

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-only-strong-password
          POSTGRES_DB: jeffries_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jeffries_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:ci-only-strong-password@localhost:5432/jeffries_ci?sslmode=disable
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: backend/go.sum
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (including fresh PostgreSQL boot)
        run: go test -race ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Vulnerability scan
        run: govulncheck ./...
