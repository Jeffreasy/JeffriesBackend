
# ─────────────────────────────────────────────────────────────────────────────
# Homeapp Docker Compose (Go Backend)
#
# Services:
#   api              → Go REST backend (Render-ready, geen engine)
#   automation-engine → WiZ automation scheduler (LOCAL ONLY, nooit Render)
#   postgres         → PostgreSQL database
#   matter-server    → Matter/Thread controller (optioneel)
#
# Windows Docker Desktop note:
#   UDP unicast (specifiek IP) werkt wel vanuit containers → WiZ controle OK.
#   UDP broadcast (253.255.255.255) werkt NIET → discovery via PowerShell.
# ─────────────────────────────────────────────────────────────────────────────
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─── Matter Controller ────────────────────────────────────────
  matter-server:
    <<: *default-logging
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: homeapp-matter-server
    restart: unless-stopped
    ports:
      - "5580:5580"
    volumes:
      - matter_data:/data
    environment:
      - MATTER_SERVER_PORT=5580
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',5580),2); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - homeapp-net

  # ─── PostgreSQL Database ──────────────────────────────────────
  postgres:
    <<: *default-logging
    image: postgres:16-alpine
    container_name: homeapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-homeapp}
      POSTGRES_USER: ${DB_USER:-homeapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-homeapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homeapp-net

  # ─── Go API Backend ────────────────────────────────────────────
  api:
    <<: *default-logging
    build:
      context: ./backend
      dockerfile: ../infra/docker/api/Dockerfile
    container_name: homeapp-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${DB_USER:-homeapp}:${DB_PASSWORD:-change-me}@postgres:5432/${DB_NAME:-homeapp}?sslmode=disable
      - AUTOMATION_ENGINE_ENABLED=false
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - homeapp-net

  # ─── Automation Engine (LOCAL ONLY) ───────────────────────────
  # ⚠️  NOOIT deployen naar Render/cloud.
  # Draait 24/7 op Docker Desktop → bestuurt WiZ lampen via UDP.
  # Haalt alle data van PostgreSQL (geen Convex meer).
  automation-engine:
    <<: *default-logging
    build:
      context: ./backend
      dockerfile: ../infra/docker/automation-engine/Dockerfile
    container_name: homeapp-automation-engine
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${DB_USER:-homeapp}:${DB_PASSWORD:-change-me}@postgres:5432/${DB_NAME:-homeapp}?sslmode=disable
      - AUTOMATION_ENGINE_ENABLED=true
      - APP_DEBUG=false
      - TZ=Europe/Amsterdam
      - HOMEAPP_USER_ID=${HOMEAPP_USER_ID:-user_3Ax561ZvuSkGtWpKFooeY65HNtY}
      - GROK_API_KEY=${GROK_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - homeapp-net

volumes:
  matter_data:
  pg_data:

networks:
  homeapp-net:
    driver: bridge
