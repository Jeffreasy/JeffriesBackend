
# ─────────────────────────────────────────────────────────────────────────────
# Homeapp Docker Compose
#
# Services:
#   api              → FastAPI REST backend (Render-ready, geen engine)
#   automation-engine → WiZ automation scheduler (LOCAL ONLY, nooit Render)
#   postgres         → PostgreSQL database
#   redis            → Redis pub/sub & caching
#   matter-server    → Matter/Thread controller (optioneel)
#
# Windows Docker Desktop note:
#   UDP unicast (specifiek IP) werkt wel vanuit containers → WiZ controle OK.
#   UDP broadcast (253.255.255.255) werkt NIET → discovery via PowerShell.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── Matter Controller ────────────────────────────────────────
  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: homeapp-matter-server
    restart: unless-stopped
    ports:
      - "5580:5580"
    volumes:
      - matter_data:/data
    environment:
      - MATTER_SERVER_PORT=5580
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',5580),2); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - homeapp-net

  # ─── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: homeapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-homeapp}
      POSTGRES_USER: ${DB_USER:-homeapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-homeapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homeapp-net

  # ─── Redis (pub/sub & caching) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: homeapp-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - homeapp-net

  # ─── FastAPI Backend ──────────────────────────────────────────
  # Render-ready: AUTOMATION_ENGINE_ENABLED=false zodat de engine
  # NOOIT start op Render (WiZ is daar onbereikbaar).
  api:
    build:
      context: ./backend
      dockerfile: ../infra/docker/api/Dockerfile
    container_name: homeapp-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-homeapp}:${DB_PASSWORD:-change-me}@postgres:5432/${DB_NAME:-homeapp}
      - MATTER_SERVER_URL=ws://matter-server:5580/ws
      - REDIS_URL=redis://redis:6379/0
      - AUTOMATION_ENGINE_ENABLED=false   # Engine draait als aparte service
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - homeapp-net

  # ─── Automation Engine (LOCAL ONLY) ───────────────────────────
  # ⚠️  NOOIT deployen naar Render/cloud.
  # Draait 24/7 op Docker Desktop → bestuurt WiZ lampen via UDP.
  # Haalt automations + rooster op van Convex (internet).
  # restart: always → start automatisch bij Docker Desktop opstart.
  automation-engine:
    build:
      context: ./backend
      dockerfile: ../infra/docker/automation-engine/Dockerfile
    container_name: homeapp-automation-engine
    restart: always                        # Start automatisch bij Windows boot
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-homeapp}:${DB_PASSWORD:-change-me}@postgres:5432/${DB_NAME:-homeapp}
      - AUTOMATION_ENGINE_ENABLED=true     # Expliciet aan voor lokale Docker
      - APP_DEBUG=false                    # Geen SQL echo in engine logs
      - TZ=Europe/Amsterdam               # Tijdzone fix: containers draaien UTC
      - CONVEX_SITE_URL=${CONVEX_SITE_URL:-https://adorable-mink-458.eu-west-1.convex.site}
      - HOMEAPP_GAS_SECRET=${HOMEAPP_GAS_SECRET:-homeapp-gas-sync-2026-secure}
      - HOMEAPP_USER_ID=${HOMEAPP_USER_ID:-user_3Ax561ZvuSkGtWpKFooeY65HNtY}
    volumes:
      - ./backend:/app                     # hot reload in development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - homeapp-net

volumes:
  matter_data:
  pg_data:
  redis_data:

networks:
  homeapp-net:
    driver: bridge
