host: localhost:8000
info:
  contact: {}
  description: Backend REST API for Jeffries Homeapp.
  title: Jeffries Homeapp API
  version: "1.0"
paths:
  /automations:
    get:
      description: Returns all home automations for the user
      parameters:
      - description: User ID
        in: query
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.AutomationRow'
            type: array
        "400":
          description: userId required
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: List automations
      tags:
      - Automations
    post:
      consumes:
      - application/json
      description: Creates a new home automation rule
      parameters:
      - description: User ID
        in: query
        name: userId
        required: true
        type: string
      - description: Automation Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.AutomationRow'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.AutomationRow'
        "400":
          description: userId required or invalid JSON
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Create automation
      tags:
      - Automations
  /automations/{id}:
    delete:
      description: Deletes an automation by its ID
      parameters:
      - description: Automation ID (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: status deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: invalid id
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete automation
      tags:
      - Automations
    put:
      consumes:
      - application/json
      description: Modifies a home automation rule
      parameters:
      - description: Automation ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Automation Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.AutomationRow'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AutomationRow'
        "400":
          description: invalid id or JSON
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Update automation
      tags:
      - Automations
  /automations/{id}/toggle:
    post:
      description: Enables or disables an automation
      parameters:
      - description: Automation ID (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: status toggled
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: invalid id
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Toggle automation
      tags:
      - Automations
  /automations/group:
    delete:
      description: Deletes all automations within a specific group
      parameters:
      - description: User ID
        in: query
        name: userId
        required: true
        type: string
      - description: Group name
        in: query
        name: group
        required: true
        type: string
      responses:
        "200":
          description: status deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: userId and group required
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete automations by group
      tags:
      - Automations
  /devices:
    get:
      description: Returns a list of all devices in the homeapp
      parameters:
      - default: 0
        description: Skip count
        in: query
        name: skip
        type: integer
      - default: 100
        description: Limit count
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.DeviceResponse'
            type: array
        "500":
          description: Failed to fetch devices
          schema:
            type: string
      summary: List all devices
      tags:
      - Devices
  /devices/{deviceID}:
    delete:
      description: Deletes a device by its ID
      parameters:
      - description: Device ID (UUID)
        in: path
        name: deviceID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid device ID
          schema:
            type: string
        "404":
          description: Device not found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Delete a device
      tags:
      - Devices
    get:
      description: Returns a single device by its ID
      parameters:
      - description: Device ID (UUID)
        in: path
        name: deviceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.DeviceResponse'
        "400":
          description: Invalid device ID
          schema:
            type: string
        "404":
          description: Device not found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Get a device
      tags:
      - Devices
    patch:
      consumes:
      - application/json
      description: Modifies an existing device
      parameters:
      - description: Device ID (UUID)
        in: path
        name: deviceID
        required: true
        type: string
      - description: Updated Device Details
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.DeviceResponse'
        "400":
          description: Invalid request body or ID
          schema:
            type: string
        "404":
          description: Device not found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
        "502":
          description: WiZ lamp unreachable
          schema:
            type: string
      summary: Update a device
      tags:
      - Devices
  /devices/{deviceID}/command:
    post:
      consumes:
      - application/json
      description: Controls a WiZ bulb via UDP (on/off, brightness, color, scene)
      parameters:
      - description: Device ID (UUID)
        in: path
        name: deviceID
        required: true
        type: string
      - description: Command Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.DeviceCommandRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request body or ID
          schema:
            type: string
        "404":
          description: Device not found
          schema:
            type: string
        "422":
          description: Device has no IP address
          schema:
            type: string
        "502":
          description: WiZ command failed
          schema:
            type: string
      summary: Send command to WiZ device
      tags:
      - Devices
  /devices/register:
    post:
      consumes:
      - application/json
      description: Registers a new WiZ bulb via local UDP verification
      parameters:
      - description: Device Registration Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.DeviceRegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.DeviceResponse'
        "400":
          description: Invalid request body or missing IP/name
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
        "502":
          description: Cannot reach WiZ bulb
          schema:
            type: string
      summary: Register a WiZ device
      tags:
      - Devices
  /emails:
    get:
      description: Returns paginated emails for the user, optionally filtered by category
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: string
      - default: 50
        description: Limit count
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset count
        in: query
        name: offset
        type: integer
      - description: Category filter
        in: query
        name: categorie
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Email'
            type: array
        "400":
          description: user_id is required
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: List emails
      tags:
      - Emails
  /emails/delete:
    patch:
      consumes:
      - application/json
      description: Soft-deletes a specific email
      parameters:
      - description: Delete Details (user_id, gmail_id)
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: status ok
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: invalid request body
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete email
      tags:
      - Emails
  /emails/read:
    patch:
      consumes:
      - application/json
      description: Updates the read status of a specific email
      parameters:
      - description: Read Status Details (user_id, gmail_id, read)
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: status ok
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: invalid request body
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Mark email read status
      tags:
      - Emails
  /emails/search:
    get:
      description: Performs a full-text search across user emails
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: string
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      - default: 50
        description: Limit count
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Email'
            type: array
        "400":
          description: user_id and q are required
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Search emails
      tags:
      - Emails
  /emails/stats:
    get:
      description: Returns total and unread email counts for the user
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: user_id is required
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Get email stats
      tags:
      - Emails
  /focus/summary:
    get:
      description: Returns a compact read-only cross-domain status snapshot for the
        tablet focus dashboard
      parameters:
      - description: User ID
        in: query
        name: userId
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.FocusSummary'
      summary: Get Focus summary
      tags:
      - Focus
  /habits:
    get:
      description: Returns all active habits for the user
      parameters:
      - description: User ID
        in: query
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
